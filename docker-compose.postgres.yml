services:
  shelve:
    container_name: shelve
    # Image defaults to :latest tag (points to stable release branch)
    # You can also explicitly use :latest, :release, or :dev
    image: ghcr.io/dannyvfilms/shelve
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - TZ=Europe/Berlin
      - SECRET=longstring
      - REDIS_URL=redis://redis:6379
      - DB_HOST=db
      - DB_NAME=shelve
      - DB_USER=shelve
      - DB_PASSWORD=shelve
      - DB_PORT=5432
      - ADMIN_ENABLED=False
    ports:
      - "8000:8000"

  db:
    image: postgres:16-alpine
    container_name: shelve-db
    environment:
      - POSTGRES_DB=shelve
      - POSTGRES_USER=shelve
      - POSTGRES_PASSWORD=shelve
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    container_name: shelve-redis
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  postgres_data:
